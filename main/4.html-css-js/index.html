<!-- Crie um site para informar se uma pessoa é obrigada a votar.

Considere que a regra é:
menores de 16, não podem votar
entre 16 e 17 anos, voto opcional
a partir de 18, voto obrigatório
maiores que 65 não são obrigados a votar -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Eleitoral // TECH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="Tela">
        <h2>SISTEMA DE VOTO</h2>
            <label for="idadeInput"> Inserir Idade </label>
            <input type="number" id="idadeInput" placeholder="00" min="0">
        </div>



        <button id="gerarBotao">Processar Dados</button>
        
        <div id="menoresde16" class="resultado alerta-vermelho"></div>
        <div id="entre16e17" class="resultado alerta-amarelo"></div>
        <div id="maior" class="resultado alerta-verde"></div>
        <div id="maior65" class="resultado alerta-azul"></div>
    </div>
<br>
<a href="../index.html">⬅️ Voltar para o Menu Principal</a>

    <script src="script.js"></script>
</body>
</html>
