 <!-- ATIVIDADE 

Solicite ao usuário o nome e duas notas.
Calcule e mostre a média aritmética.
Considerando a média aritmética.
Considerando a média 7,0 para aprovação, informe se está aprovado ou reprovado. -->

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Média Gamer</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <img src="imagens/fundo.media.gif" alt="fundo.media" class="tela-fundo-img">

    <div class="console-body">
        <div class="game-screen">
            <h2>MEDIA QUEST: LEVEL 1</h2>

            <div class="input-group">
                <label>Player Name:</label>
                <input type="text" id="nomeInput" placeholder="NOME", style="color: #ffffff; >
            </div>
            
            <div class="input-group">
                <label>EXP 1 (Nota):</label>
                <input type="number" id="nota1" min="0" max="10">
            </div>

            <div class="input-group">
                <label>EXP 2 (Nota):</label>
                <input type="number" id="nota2" min="0" max="10">
            </div>

            <div class="input-group">
                <label>EXP 3 (Nota):</label>
                <input type="number" id="nota3" min="0" max="10">
            </div>

            <div id="resultadoMedia"></div>
        </div>

        <div class="controls">
            <div style="color: #ffffff; font-weight: bold;">SELECT  START</div>
            <button id="gerarBotao" onclick="resultadoMedia()">START</button>
        </div>
        
        <a href="../index.html">⬅️ QUIT GAME</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
