<!-- Escreva um algoritmo que leia três notas de um aluno.
Caso seja menor que O ou maior que 10, mostre a pergunta
novamente.
Após receber as notas dentro dos parâmetros.acima, calcule a média e
verifique se o aluno está aprovado, recuperação ou reprovado
considerando os seguintes critérios:
Se a média for a partir de 7, aprovado;
Se a média for entre 5 e 6,9, o aluno está em recuperação;
Caso seja menor que 5, o aluno está reprovado. -->


<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno // Sistema Acadêmico</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="background-escola"></div>

    <main class="portal-container">
        
        <header class="portal-header">
            <div class="logo-portal">🎓</div>
            <div>
                <h1>Portal do Aluno</h1>
                <p>Módulo de Lançamento de Notas</p>
            </div>
        </header>

        <section class="card-conteudo">
            <h2>Boletim Escolar - 1º Semestre</h2>
            <hr class="linha-divisoria">
            
            <div class="notas-grid">
                <div class="bloco-nota">
                    <label for="nota1">Nota da 1ª Avaliação:</label>
                    <input type="number" id="nota1" placeholder="Ex.: 7.0" step="0.1" min="0" max="10">
                </div> 
                
                <div class="bloco-nota">
                    <label for="nota2">Nota da 2ª Avaliação:</label>
                    <input type="number" id="nota2" placeholder="Ex.: 7.0" step="0.1" min="0" max="10">
                </div>    
                
                <div class="bloco-nota">
                    <label for="nota3">Nota da 3ª Avaliação:</label>
                    <input type="number" id="nota3" placeholder="Ex.: 7.0" step="0.1" min="0" max="10">
                </div>  
            </div>

            <button id="btnCalcular">Processar Média Final</button>
            
            <div id="resultado" class="escondido"></div>
        </section>

        <footer class="portal-footer">
            <a href="../index.html" class="btn-voltar">⮜ Voltar para o Menu Principal</a>
        </footer>

    </main>

    <script src="script.js"></script>
</body>
</html>
