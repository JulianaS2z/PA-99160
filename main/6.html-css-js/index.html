<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartório do INSS // Documento Antigo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="background-antigo"></div>

    <main class="pergaminho">
        <h1>Decreto de Aposentadoria</h1>
        <p class="subtitulo">Insira os dados do requerente nas linhas abaixo:</p>
        
        <div class="linha-formulario">
            <label for="codigo">Matrícula do Cidadão:</label>
            <input type="text" id="codigo" placeholder="Ex: 1234">
        </div>
        
        <div class="linha-formulario">
            <label for="anoNascimento">Ano de Nascimento:</label>
            <input type="number" id="anoNascimento" placeholder="Ex: 1960">
        </div>
        
        <div class="linha-formulario">
            <label for="tempoTrabalho">Anos de Serviço:</label>
            <input type="number" id="tempoTrabalho" placeholder="Ex: 35">
        </div>

        <button id="btn-confirmar">Selar Requerimento</button>

        <div id="resultado" class="oculto"></div>

        <div class="nav-container">
            <a href="../index.html" class="btn-voltar">⮜ Retornar aos Arquivos</a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
