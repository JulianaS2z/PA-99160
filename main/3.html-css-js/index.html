<!-- Elabore um algoritmo para solicitar dois números e ao final mostre na tela: -->
<!-- A média, a soma, o produto, o maior e o menor número -->
<!-- Usando uma linha para cada resultado -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algoritmo de Cálculos - Super Mario</title>
  <link rel="stylesheet" href="3.style.css">
</head>
<body>
        <h1>Digite 2 números</h1>
        
        <div id="Numero1">
          <label for="N1">Digite seu 1° número</label>
          <input type="number" id="N1" placeholder="1, 2, 3..." step="0.1">
        </div>
        
        <div id="Numero2">
          <label for="N2">Digite seu 2° número</label>
          <input type="number" id="N2" placeholder="1, 2, 3..." step="0.1">
        </div>
        
        <button id="gerarBotao">Resultado</button>
        
        <div id="media"></div>
        <div id="soma"></div>
        <div id="produto"></div>
        <div id="maiorNumero"></div>
        <div id="menorNumero"></div>
      </div>
    </div>
    <br>
<a href="../index.html">⬅️ Voltar para o Menu Principal</a>

  </div> <script src="3.script.js"></script>
</body>
</html>
