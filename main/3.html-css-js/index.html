<!-- Elabore um algoritmo para solicitar dois números e ao final mostre na tela: -->
<!-- A média, a soma, o produto, o maior e o menor número -->
<!-- Usando uma linha para cada resultado -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoritmo de Cálculos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    
    <video autoplay loop muted playsinline class="video-fundo">
        <source src="imagens/mario.fundo.mp4" type="video/mp4">
    </video>

    <div class="caixa">
        
        <img src="imagens/mario 1.gif" alt="mario" class="gif-mario">
        <img src="imagens/luckblock.gif" alt="lucky block" class="gif-bloco">

        <h1>Cálculos<br>2 números</h1>
        
        <div id="Numero1">
            <label for="N1">Digite o 1° número:</label>
            <input type="number" id="N1" placeholder="Ex: 5" step="0.1">
        </div>
        
        <div id="Numero2" class="escondido">
            <label for="N2">Digite o 2° número:</label>
            <input type="number" id="N2" placeholder="Ex: 10" step="0.1">
            <button id="gerarBotao">GERAR RESULTADOS</button>
        </div>
        
        <div id="media" class="resultado"></div>
        <div id="soma" class="resultado"></div>
        <div id="produto" class="resultado"></div>
        <div id="maiorNumero" class="resultado"></div>
        <div id="menorNumero" class="resultado"></div>
        
        <br>
        <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
