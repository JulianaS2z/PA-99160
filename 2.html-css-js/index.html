<!-- ATIVIDADE

Solicite ao usuário o nome e duas notas.
Calcule e mostre a média aritmética.
Considerando a média aritmética.
Considerando a média 7,0 para aprovação, informe se está aprovado ou reprovado. -->

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Média</title>
    <link rel="stylesheet" href="2.style.css"> 
</head>
<body>
    
             <html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Média</title>
</head>
<body>

    <h2>Calculadora de Média Escolar</h2>

    <div>
        <label for="nomeInput">Nome do Aluno:</label>
        <input type="text" id="nomeInput" placeholder="Digite o nome">
    </div>
    <br>
    <div>
        <label for="nota1">Nota 1:</label>
        <input type="number" id="nota1" placeholder="0 a 10" min="0" max="10">
    </div>
    <br>
    <div>
        <label for="nota2">Nota 2:</label>
        <input type="number" id="nota2" placeholder="0 a 10" min="0" max="10">
    </div>
    <br>
    <div>
        <label for="nota3">Nota 3:</label>
        <input type="number" id="nota3" placeholder="0 a 10" min="0" max="10">
    </div>
    <br>

    <button id="gerarBotao" onclick="resultadoMedia()">Calcular Média</button>
    <br><br>
    <strong><div id="resultadoMedia" style="color: blue;"></div></strong>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
