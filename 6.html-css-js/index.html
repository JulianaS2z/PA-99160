<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSS da Juju</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Veja seu direito de aposentadoria aqui</h1>
    
    <div>
        <label for="codigo">Digite sua Matrícula: </label>
        <input type="text" id="codigo" placeholder="Ex: 1234">
    </div>
    <br>
    <div>
        <label for="anoNascimento">Ano de nascimento: </label>
        <input type="number" id="anoNascimento" placeholder="Ex: 1960">
    </div>
    <br>
    <div>
        <label for="tempoTrabalho">Tempo de trabalho (anos): </label>
        <input type="number" id="tempoTrabalho" placeholder="Ex: 35">
    </div>
    <br>

    <button id="resultado">Confirmar</button>

    <br><br>

    <div id="resultado"></div>

<script src="script.js"></script>
</body>
</html>
<!-- Elabore um algoritmo usando operações lógicas para uma empresa que quer verificar se
um empregado está qualificado para a aposentadoria ou não.
Para estar em condições, um dos seguintes requisitos deve ser satisfeito:
• Ter no mínimo 65 anos de idade.
• Ter trabalhado no mínimo 30 anos.
Com base nas informações acima, faça um algoritmo que solicite ao usuário: a
matrícula do empregado (código), o ano de seu nascimento e o tempo de trabalho em anos 
O programa deverá escrever o código do empregado, a idade, o tempo de trabalho do
empregado e a mensagem "Requerer aposentadoria" ou "Não
requerer aposentadoria. -->
