<!-- ATIVIDADE

Solicite ao usuário o nome e duas notas.
Calcule e mostre a média aritmética.
Considerando a média aritmética.
Considerando a média 7,0 para aprovação, informe se está aprovado ou reprovado. -->

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Média</title>
    <link rel="stylesheet" href="2.style.css"> 
</head>
<body>
    <div class="container"> 
        <div class="caixa"> 
            <div class="todos">   
                <h1>Calcule sua Média</h1>
                
                <label for="nomeInput">Informe o seu nome:</label>
                <input type="text" id="nomeInput" placeholder="Ex.: Juliana"> 
                
                <div id="blocoNota1">
                    <label for="nota1">Digite sua 1ª nota:</label>
                    <input type="number" id="nota1" placeholder="Ex.: 7.0" step="0.1" min="0" max="10">
                </div> 

                <div id="blocoNota2">
                    <label for="nota2"> Digite sua 2ª nota: </label>
                    <input type="number" id="nota2" placeholder="Ex.: 7.0" step="0.1" min="0" max="10">
                </div>    
                <button id="gerarBotao">Calcular Média</button>
            </div>
            <div id="resultadoMedia"></div>
        </div>
    </div>

    <script src="2.script.js"></script>
</body>
</html>
